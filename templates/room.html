<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room {{ room_code }} - PDF Quiz Arena</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div id="confettiOverlay" class="confetti-overlay hidden">
    <div id="confettiPieces" class="confetti-pieces"></div>
    <div class="confetti-banner">CORRECT!</div>
  </div>

  <div id="freddyOverlay" class="freddy-overlay hidden">
    <div class="freddy-content">\n      <div class="freddy-title">FREDDY JUMPSCARE</div>\n      <img src="{{ url_for('static', filename='freddy-jumpscare.jpg') }}" alt="Freddy jumpscare" class="freddy-image" />
      <div class="freddy-sub">Wrong Answer!</div>
    </div>
  </div>

  <main class="container room-wrap">
    <header class="room-header">
      <h1>Room <span id="roomCode">{{ room_code }}</span></h1>
      <div id="roomMeta" class="muted"></div>
    </header>

    <section class="panel">
      <div class="panel-head">
        <h2>Question</h2>
        <button id="startBtn" class="btn">Start Game</button>
      </div>
      <div id="questionArea" class="question-area">
        <p class="muted">Waiting for game to start...</p>
      </div>
      <div id="options" class="options"></div>
      <button id="nextBtn" class="btn hidden">Next Round</button>
    </section>

    <section class="panel">
      <h2>Round Report</h2>
      <div id="roundReport" class="report muted">No round data yet.</div>
    </section>

    <section class="panel">
      <h2>Scoreboard</h2>
      <div id="scoreboard" class="scoreboard"></div>
    </section>

    <section class="panel hidden" id="finalPanel">
      <h2>Final Standings</h2>
      <div id="finalStandings"></div>
      <button id="restartBtn" class="btn hidden">Restart Same Lobby</button>
    </section>

    <a href="/" class="back-link">Back to lobby</a>
  </main>

  <script>
    const socket = io();
    const questionArea = document.getElementById("questionArea");
    const optionsBox = document.getElementById("options");
    const scoreboard = document.getElementById("scoreboard");
    const roomMeta = document.getElementById("roomMeta");
    const startBtn = document.getElementById("startBtn");
    const nextBtn = document.getElementById("nextBtn");
    const roundReport = document.getElementById("roundReport");
    const finalPanel = document.getElementById("finalPanel");
    const finalStandings = document.getElementById("finalStandings");
    const restartBtn = document.getElementById("restartBtn");
    const freddyOverlay = document.getElementById("freddyOverlay");
    const confettiOverlay = document.getElementById("confettiOverlay");
    const confettiPieces = document.getElementById("confettiPieces");

    let me = null;
    let state = null;
    let answered = false;

    function renderState() {
      if (!state) return;
      roomMeta.textContent = `Difficulty: ${state.difficulty} | Rounds: ${state.rounds} | Status: ${state.status}`;

      scoreboard.innerHTML = "";
      state.players.forEach((p, i) => {
        const row = document.createElement("div");
        row.className = "score-row";
        const tag = p.id === state.leader_id ? "(Leader)" : "";
        const conn = p.connected ? "online" : "offline";
        row.innerHTML = `<span>${i + 1}. ${p.name} ${tag} <small class="muted">${conn}</small></span><strong>${p.score}</strong>`;
        scoreboard.appendChild(row);
      });

      const isLeader = me && me.player_id === state.leader_id;
      startBtn.classList.toggle("hidden", !(isLeader && state.status === "waiting"));
      nextBtn.classList.toggle("hidden", !(isLeader && state.status === "in_progress"));
      restartBtn.classList.toggle("hidden", !(isLeader && state.status === "finished"));
    }

    function renderQuestion(payload) {
      answered = false;
      questionArea.innerHTML = `<h3>Round ${payload.round} / ${payload.total_rounds}</h3><p>${payload.question}</p>`;
      optionsBox.innerHTML = "";
      payload.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = `${String.fromCharCode(65 + idx)}. ${opt}`;
        btn.onclick = () => {
          if (answered) return;
          answered = true;
          socket.emit("submit_answer", { choice: idx });
          [...optionsBox.querySelectorAll("button")].forEach(b => b.disabled = true);
          btn.classList.add("picked");
        };
        optionsBox.appendChild(btn);
      });
    }

    function renderRoundReport(report) {
      const rows = report.details.map(d => {
        return `<tr>
          <td>${d.name}</td>
          <td>${d.result}</td>
          <td>${d.delta}</td>
          <td>${d.score}</td>
        </tr>`;
      }).join("");

      roundReport.classList.remove("muted");
      roundReport.innerHTML = `
        <p><strong>Round ${report.round} complete.</strong> Correct answer: ${report.correct_text}</p>
        <table>
          <thead><tr><th>Player</th><th>Result</th><th>Last Q Points</th><th>Score</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function triggerFreddyScare() {
      freddyOverlay.classList.remove("hidden");
      freddyOverlay.classList.add("active");
      setTimeout(() => {
        freddyOverlay.classList.remove("active");
        freddyOverlay.classList.add("hidden");
      }, 2000);
    }

    function triggerConfetti() {
      confettiPieces.innerHTML = "";
      for (let i = 0; i < 90; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.backgroundColor = `hsl(${Math.floor(Math.random() * 360)}, 90%, 55%)`;
        piece.style.animationDelay = `${Math.random() * 0.35}s`;
        piece.style.animationDuration = `${1.3 + Math.random() * 1.1}s`;
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        confettiPieces.appendChild(piece);
      }

      confettiOverlay.classList.remove("hidden");
      confettiOverlay.classList.add("active");
      setTimeout(() => {
        confettiOverlay.classList.remove("active");
        confettiOverlay.classList.add("hidden");
        confettiPieces.innerHTML = "";
      }, 2000);
    }

    socket.on("joined", (payload) => {
      me = payload;
    });

    socket.on("room_state", (payload) => {
      state = payload;
      renderState();
    });

    socket.on("question", (payload) => {
      renderQuestion(payload);
      nextBtn.classList.add("hidden");
      finalPanel.classList.add("hidden");
    });

    socket.on("round_result", (payload) => {
      renderRoundReport(payload);
      const myResult = me ? payload.details.find(d => d.player_id === me.player_id) : null;
      if (myResult && myResult.result === "wrong") {
        triggerFreddyScare();
      }
      if (myResult && myResult.result === "correct") {
        triggerConfetti();
      }
      const isLeader = me && state && me.player_id === state.leader_id;
      if (isLeader) nextBtn.classList.remove("hidden");
    });

    socket.on("game_over", (payload) => {
      finalPanel.classList.remove("hidden");
      const rows = payload.standings.map((p, i) => `<div class="score-row"><span>${i + 1}. ${p.name}</span><strong>${p.score}</strong></div>`).join("");
      finalStandings.innerHTML = `<p><strong>Winner:</strong> ${payload.winner}</p>${rows}`;
      nextBtn.classList.add("hidden");
      startBtn.classList.add("hidden");
      optionsBox.innerHTML = "";
    });

    socket.on("error_msg", (payload) => {
      alert(payload.message);
    });

    startBtn.addEventListener("click", () => socket.emit("start_game"));
    nextBtn.addEventListener("click", () => {
      nextBtn.classList.add("hidden");
      socket.emit("next_round");
    });
    restartBtn.addEventListener("click", () => {
      restartBtn.classList.add("hidden");
      roundReport.classList.add("muted");
      roundReport.innerHTML = "No round data yet.";
      socket.emit("restart_game");
    });
  </script>
</body>
</html>
